name = "restaurantsdeschefs"
compatibility_date = "2024-11-01"

# Secrets (production) — connexion éditeur /admin :
#   npx wrangler secret put ADMIN_PASSWORD
#   npx wrangler secret put ADMIN_SESSION_SECRET   # chaîne aléatoire longue (ex. openssl rand -hex 32)
#   Optionnel : npx wrangler secret put ADMIN_EMAIL   # sinon seul reveadream@gmail.com est accepté
# Migration contenus fiches : data/migration-etablissement-fiches.sql
# Puis image couverture carte / bandeau : data/migration-fiche-card-cover-url.sql

pages_build_output_dir = "./out"

# Liaisons gérées par ce fichier (dashboard Pages : bindings désactivés / « managed through wrangler »).
# Variable **DB** = celle lue par functions/api/*.ts via context.env.DB
[[d1_databases]]
binding = "DB"
database_name = "chefs_db"
database_id = "f3d13278-172f-4871-895f-bfe8f8c89a84"
