# Déploiement automatique sur Cloudflare Pages après chaque push sur la branche principale.
#
# Sur le tableau de bord Cloudflare, « Cloning » / « Building » peuvent apparaître en « — » :
# c’est normal : le build Next se fait ICI (GitHub Actions), puis `wrangler pages deploy`
# envoie le dossier `out/`. Seule l’étape « Deploy to global network » s’exécute chez Cloudflare.
#
# Si le site ne se met pas à jour : vérifiez que ce workflow est VERT après votre push sur main,
# que les secrets CLOUDFLARE_* sont bien définis, et évitez un second déploiement Git Cloudflare
# mal configuré (même projet + dépôt) qui écraserait avec une vieille config.
#
# Prérequis (Secrets du dépôt GitHub) :
#   CLOUDFLARE_API_TOKEN — jeton avec droits « Cloudflare Pages — Edit » (et Workers si besoin).
#   CLOUDFLARE_ACCOUNT_ID — identifiant du compte (aperçu du tableau de bord Cloudflare).
name: Deploy Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Verify build output (out/)
        run: |
          test -f out/index.html || (echo "ERREUR: out/index.html manquant." && exit 1)
          test -f out/restaurant.html || test -f out/restaurant/index.html || (echo "ERREUR: route restaurant manquante dans out/." && exit 1)
          echo "Contenu de out/ (extrait):"
          ls -la out | head -30

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=restaurantsdeschefs
